<div class="app-shell">
  <aside class="sidebar">
    <div class="marca">
      <span>AJ</span>
      <strong>Autenticação JWT</strong>
    </div>

    <nav aria-label="Navegação principal">
      <a routerLink="/produtos" routerLinkActive="ativo">Produtos</a>
      <a routerLink="/categorias" routerLinkActive="ativo">Categorias</a>
    </nav>

    <div class="usuario-area">
      @if (menuUsuarioAberto()) {
        <button class="botao-sair" type="button" (click)="sair()">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </svg>
          Logout
        </button>
      }

      <button class="usuario-botao" type="button" (click)="alternarMenuUsuario()" [class.aberto]="menuUsuarioAberto()">
        <span class="avatar">A</span>
        <span class="usuario-info">
          <strong>Administrador</strong>
          <small>admin@mail.com</small>
        </span>
        <span class="seta">^</span>
      </button>
    </div>
  </aside>

  <div class="conteudo">
    <header class="topo">
      <h1>Autenticação JWT</h1>
    </header>

    <main>
      <router-outlet />
    </main>

    <footer>Desenvolvido em Angular</footer>
  </div>
</div>
